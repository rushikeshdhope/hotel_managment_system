<div class="navbar">
    <i class="bi bi-arrow-90deg-left" routerLink="/bookings" ></i>
    <h1>Room Catagory </h1>
    <button (click)="ClickAddRoom()">Add Room Category</button>
</div>

<form [formGroup]="roomcategoryForm" (ngSubmit)="NewRoom()" class="mb-4">
 
    <div class="NewRoomContainer" *ngIf="AddNewRoomContainer">
      <span class="closebtn" (click)="closeNav()">&#10005;</span>
      <div>
        <label for="room_category_name">Name:</label>
        <input type="text" id="room_category_name" formControlName="room_category_name">
        <div *ngIf="roomcategoryForm.get('room_category_name')?.invalid && roomcategoryForm.get('room_category_name')?.touched">
          <small *ngIf="roomcategoryForm.get('room_category_name')?.errors?.['required']">Name is required.</small>
        </div>
      </div>
      
      <div>
        <label for="description">Description:</label>
        <input type="text" id="description" formControlName="description">
        <div *ngIf="roomcategoryForm.get('description')?.invalid && roomcategoryForm.get('description')?.touched">
          <small *ngIf="roomcategoryForm.get('description')?.errors?.['required']">Description is required.</small>
        </div>
      </div>
      <!-- *ngIf="!editMode" -->
      <div >
        <label for="file">Upload File:</label>
        <input id="file" type="file" (change)="onFileChange($event)">
        <div *ngIf="roomcategoryForm.get('file')?.invalid && roomcategoryForm.get('file')?.touched">
          <small *ngIf="roomcategoryForm.get('file')?.errors?.['required']">File upload is required.</small>
        </div>
      </div>
      <button type="submit" [disabled]="roomcategoryForm.invalid">Submit</button>
    </div>
  </form>
  

<table>
    <tr>
        <th>Sr.No</th>
        <th>Room Type</th>
        <th>Description</th>
        <!-- <th>Image</th> -->
        <th> Action </th>
    </tr>
    <tr *ngIf="RoomArray.length == 0">
      <td colspan="15" class="text-center">No record found</td>
    </tr>
    <tr *ngFor="let data of RoomArray; let i = index">
      <td>{{i+1}}</td>
        <!-- <td>{{ data.room_category_id }}</td> -->
        <td>{{ data.room_category_name}}</td>
        <td>{{ data.description}}</td>
        <!-- <td><img [src]="data.image_link" style="height: 40px; width: 40px;"></td> -->
        <!-- <td *ngIf="editMode && editRowIndex === i">
            <input type="text" [(ngModel)]="roomName" pattern="[a-zA-Z]*" maxlength="30">
            <div *ngIf="!isValidRoomName()" class="text-danger">Only alphabetic characters allowed.</div>
<button (click)="EditRoomName(data)" [disabled]="!isValidRoomName()">Save</button>
            
          </td>
         -->
        
        <td><i class="bi bi-pencil-square" (click)="EditRoom(i,data)"></i>
            <i class="bi bi-trash3" (click)="DeleteRoom(data.room_category_id)"></i>
        <a (click)="navigateRoomDetail(data.room_category_id)">view or add room</a></td>
    </tr>
</table>
