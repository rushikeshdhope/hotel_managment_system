<section class="back-img">
  <div class="background-wrapper">
    <div class="profile-container">
      <h2 class="profile-title">Update Profile</h2>
      <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
  
        <div class="form-group">
          <label for="customer_name">Guest Name</label>
          <input id="customer_name" formControlName="customer_name" type="text" class="form-control"
            placeholder="Enter Guest Name">
        </div>
  
        <div class="form-group">
          <label for="customer_email">Guest Email</label>
          <input id="customer_email" formControlName="customer_email" type="email" class="form-control"
            placeholder="Enter Guest Email">
        </div>
  
        <div class="form-group">
          <label for="customer_mobile">Guest Mobile</label>
          <input id="customer_mobile" formControlName="customer_mobile" type="text" class="form-control"
            placeholder="Enter Guest Mobile">
        </div>
  
        <div class="form-group">
          <label for="identity_type">Identity Type</label>
          <select id="identity_type" formControlName="identity_type" class="form-control">
            <option value="">Select Identity Type</option>
            <option *ngFor="let type of identityTypes" [value]="type">{{ type }}</option>
          </select>
        </div>
  
        <div class="form-group">
          <label for="identity_number">Identity Number</label>
          <input id="identity_number" formControlName="identity_number" type="text" class="form-control"
            placeholder="Enter Identity Number">
        </div>
  
        <div class="form-group">
          <label for="file">Upload File</label>
          <input id="file" type="file" (change)="onFileChange($event)" class="form-control">
        </div>
  
        <div class="form-group">
          <label>Document Image</label>
          <img [src]="profileImage" alt="Profile Image" class="profile-image" *ngIf="profileImage">
        </div>
  
        <button type="submit" class="btn-submit">Update Profile</button>
      </form>
    </div>
  </div>
</section>
