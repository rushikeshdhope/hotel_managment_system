
<div class="container">
  <h2>Forgot Password</h2>

  <form *ngIf="!otpSent" [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmitEmail()">
    <div class="form-group">
      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        formControlName="email"
        class="form-control"
        placeholder="Enter your email"
      />
      <div *ngIf="forgotPasswordForm.get('email')?.invalid && forgotPasswordForm.get('email')?.touched" class="text-danger">
        <small *ngIf="forgotPasswordForm.get('email')?.errors?.['required']">Email is required.</small>
        <small *ngIf="forgotPasswordForm.get('email')?.errors?.['email']">Enter a valid email address.</small>
      </div>
    </div>
    <button type="submit" class="btn btn-primary btn-block" [disabled]="forgotPasswordForm.invalid">Send OTP</button>
    <div *ngIf="emailError" class="alert alert-danger mt-3">{{ emailError }}</div>
  </form>

  <form *ngIf="otpSent && !otpVerified" [formGroup]="otpForm" (ngSubmit)="onSubmitOtp()">
    <div class="form-group">
      <label for="otp">Enter OTP</label>
      <input
        type="text"
        id="otp"
        formControlName="otp"
        class="form-control"
        placeholder="Enter OTP"
      />
      <div *ngIf="otpForm.get('otp')?.invalid && otpForm.get('otp')?.touched" class="text-danger">
        <small *ngIf="otpForm.get('otp')?.errors?.['required']">OTP is required.</small>
      </div>
    </div>
    <button type="submit" class="btn btn-primary btn-block" [disabled]="otpForm.invalid">Verify OTP</button>
    <div *ngIf="otpError" class="alert alert-danger mt-3">{{ otpError }}</div>
  </form>

  <form *ngIf="otpVerified" [formGroup]="resetPasswordForm" (ngSubmit)="onSubmitResetPassword()">
    <div class="form-group">
      <label for="newPassword">New Password</label>
      <input
        type="password"
        id="newPassword"
        formControlName="newPassword"
        class="form-control"
        placeholder="Enter new password"
      />
      <div *ngIf="resetPasswordForm.get('newPassword')?.invalid && resetPasswordForm.get('newPassword')?.touched" class="text-danger">
        <small *ngIf="resetPasswordForm.get('newPassword')?.errors?.['required']">New password is required.</small>
        <small *ngIf="resetPasswordForm.get('newPassword')?.errors?.['minlength']">Password must be at least 6 characters long.</small>
      </div>
    </div>
    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>
      <input
        type="password"
        id="confirmPassword"
        formControlName="confirmPassword"
        class="form-control"
        placeholder="Confirm new password"
      />
      <div *ngIf="resetPasswordForm.errors?.['passwordsMismatch']" class="text-danger">
        <small>Passwords do not match.</small>
      </div>
    </div>
    <button type="submit" class="btn btn-primary btn-block" [disabled]="resetPasswordForm.invalid">Reset Password</button>
  </form>

  <div *ngIf="passwordUpdated" class="alert alert-success mt-3">{{ updateMessage }}</div>
  
  <div class="text-center mt-4">
    <a class="text-primary" routerLink="/login-user">Log In</a>
  </div>
</div>
