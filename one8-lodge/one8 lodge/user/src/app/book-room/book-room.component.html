<div *ngIf="isModalOpen" class="modal-overlay" (click)="closeModal()"></div>
<div *ngIf="isModalOpen && !dontshowmodel" class="modal-content">
  <h2>Enter Mobile Number</h2>
  <form [formGroup]="modalForm" (ngSubmit)="onModalSubmit()">
    <input type="tel" formControlName="mobileNumber" placeholder="Enter mobile number" maxlength="10" required>
    <button type="submit">Submit</button>
  </form>
</div>

<div class="bgimga">
</div>

<div class="rel">
  <div>
    <img src="/assets/png_023.png" alt="" class="img3">
  </div>
  <h2 class="abs">Book Now</h2>
</div>

<section class="background">
 <form [formGroup]="bookingForm" (ngSubmit)="onSubmit()" class="margi" data-aos="zoom-in" data-aos-easing="linear" data-aos-duration="1500">
  
  <div class="margin-top-medium">
    <label for="date">Date:</label>
    <input id="date" formControlName="date" type="date">
    <div *ngIf="bookingForm.get('date')?.invalid && (bookingForm.get('date')?.dirty || bookingForm.get('date')?.touched)">
      <small *ngIf="bookingForm.get('date')?.errors?.['required']">Date is required.</small>
    </div>
  </div>

  <div>
    <label for="bookingDate">Booking Date:</label>
    <input id="bookingDate" formControlName="bookingDate" type="date">
    <div *ngIf="bookingForm.get('bookingDate')?.invalid && (bookingForm.get('bookingDate')?.dirty || bookingForm.get('bookingDate')?.touched)">
      <small *ngIf="bookingForm.get('bookingDate')?.errors?.['required']">Booking Date is required.</small>
    </div>
  </div>

  <div>
    <label for="customer_name">Customer Name:</label>
    <input id="customer_name" formControlName="customer_name" placeholder="Customer Name" required>
    <div *ngIf="bookingForm.get('customer_name')?.invalid && (bookingForm.get('customer_name')?.dirty || bookingForm.get('customer_name')?.touched)">
      <small *ngIf="bookingForm.get('customer_name')?.errors?.['required']">Customer Name is required.</small>
    </div>
  </div>

  <div>
    <label for="customer_mobile">Phone Number:</label>
    <input id="customer_mobile" formControlName="customer_mobile" placeholder="Customer Mobile" maxlength="10">
    <div *ngIf="bookingForm.get('customer_mobile')?.invalid && (bookingForm.get('customer_mobile')?.dirty || bookingForm.get('customer_mobile')?.touched)">
      <small *ngIf="bookingForm.get('customer_mobile')?.errors?.['required']">Customer Mobile is required.</small>
      <small *ngIf="bookingForm.get('customer_mobile')?.errors?.['pattern']">Invalid mobile number.</small>
    </div>
  </div>

  <div>
    <label for="intime">In Time:</label>
    <input id="intime" formControlName="intime" type="text">
    <div *ngIf="bookingForm.get('intime')?.invalid && (bookingForm.get('intime')?.dirty || bookingForm.get('intime')?.touched)">
      <small *ngIf="bookingForm.get('intime')?.errors?.['required']">In Time is required.</small>
    </div>
  </div>

  <div>
    <label for="outtime">Out Time:</label>
    <input id="outtime" formControlName="outtime" type="text">
    <div *ngIf="bookingForm.get('outtime')?.invalid && (bookingForm.get('outtime')?.dirty || bookingForm.get('outtime')?.touched)">
      <small *ngIf="bookingForm.get('outtime')?.errors?.['required']">Out Time is required.</small>
    </div>
  </div>

  <div formGroupName="roomDetails">
    <label for="room_number">Room Number:</label>
    <ng-container *ngIf="isRoomNumberDisabled; else roomSelect">
      <input id="room_number" formControlName="room_number" class="form-control" type="text" readonly>
    </ng-container>
    <ng-template #roomSelect>
      <select id="room_number" formControlName="room_number" class="form-control" (change)="onRoomChange()">
        <option value="" disabled>Select room number</option>
        <option *ngFor="let data of RoomDetailArray" [ngValue]="data.room_number">{{data.room_number}}</option>
      </select>
    </ng-template>
    <div *ngIf="bookingForm.get('roomDetails.room_number')?.invalid && (bookingForm.get('roomDetails.room_number')?.dirty || bookingForm.get('roomDetails.room_number')?.touched)">
      <small *ngIf="bookingForm.get('roomDetails.room_number')?.errors?.['required']">Room Number is required.</small>
    </div>

    <label for="duration">Select hour:</label>
    <select id="duration" formControlName="duration" class="form-control" (change)="onDurationChange()">
      <option value="" disabled>Select hour</option>
      <option value="three_hour">Three Hours</option>
      <option value="six_hour">Six Hours</option>
      <option value="twelve_hour">Twelve Hours</option>
      <option value="sixteen_hour">Sixteen Hours</option>
      <option value="twentyfour_hour">Twenty-Four Hours</option>
      <option value="full_night">Full Night</option>
    </select>
    <div *ngIf="bookingForm.get('roomDetails.duration')?.invalid && (bookingForm.get('roomDetails.duration')?.dirty || bookingForm.get('roomDetails.duration')?.touched)">
      <small *ngIf="bookingForm.get('roomDetails.duration')?.errors?.['required']">Duration is required.</small>
    </div>

    <label for="is_ac">AC:</label>
    <input id="is_ac" formControlName="is_ac" type="checkbox" (change)="onAcChange()">

    <label for="amount">Amount:</label>
    <input id="amount" formControlName="amount" readonly>
    <div *ngIf="bookingForm.get('roomDetails.amount')?.invalid && (bookingForm.get('roomDetails.amount')?.dirty || bookingForm.get('roomDetails.amount')?.touched)">
      <small *ngIf="bookingForm.get('roomDetails.amount')?.errors?.['required']">Amount is required.</small>
    </div>
  </div>

  <div>
    <label for="remark">Remark:</label>
    <input id="remark" formControlName="remark" placeholder="Remark">
  </div>

  <button type="submit">Submit</button>
</form>

</section>
