<link rel="stylesheet" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<section class="container">
  <div class="row shadow border rounded-4 margi p-4 mx-1 mx-md-0">
    <div class="col-12 col-md-6" data-aos="zoom-in" data-aos-easing="linear" data-aos-duration="1500">
      <img src="/assets/ONE 8 (1).png" alt="" class="img-fluid">
    </div>
    <div class="col-12 col-md-6">
      <div class="login-form">
        <h2 data-aos="fade-up" data-aos-easing="linear" data-aos-duration="1500">Login</h2>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <div class="form-group" data-aos="fade-up" data-aos-easing="linear" data-aos-duration="1500">
            <label for="userName">Email:</label>
            <input id="userName" formControlName="user_name" type="email" placeholder="Enter your Email">
            <div *ngIf="loginForm.get('user_name')?.invalid && loginForm.get('user_name')?.touched">
              <small class="error" *ngIf="loginForm.get('user_name')?.errors?.['required']">Email is required.</small>
              <small class="error" *ngIf="loginForm.get('user_name')?.errors?.['email']">Enter a valid email address.</small>
            </div>
          </div>
      
          <div class="form-group password-group" data-aos="fade-up" data-aos-easing="linear" data-aos-duration="1500">
            <label for="userPassword">Password:</label>
            <div class="password-container">
              <input
                id="userPassword"
                [type]="passwordVisible ? 'password' : 'text'"
                formControlName="user_password"
                placeholder="Enter your Password"
              >
              <button
                type="button"
                class="eye-icon"
                (click)="togglePasswordVisibility()"
              >
                <i class="fa" [ngClass]="passwordVisible ? 'fa-eye-slash' : 'fa-eye'"></i>
              </button>
            </div>
            <div *ngIf="loginForm.get('user_password')?.invalid && loginForm.get('user_password')?.touched">
              <small class="error" *ngIf="loginForm.get('user_password')?.errors?.['required']">Password is required.</small>
            </div>
          </div>
      
          <div data-aos="fade-up" data-aos-easing="linear" data-aos-duration="1500">
            <button type="submit" [disabled]="loginForm.invalid" >Login</button>
          </div>
        </form>
      
        <br>
        <a href="#" routerLink="/forgot-password" class="tcolo mb-3" data-aos="fade-up" data-aos-easing="linear" data-aos-duration="1500">Forgot Password</a>
        <div class="text-center" data-aos="fade-up" data-aos-easing="linear" data-aos-duration="1500">
          <p>Don't have an account?</p>
          <a routerLink="/register-user" class="tcolo2" data-aos="fade-up" data-aos-easing="linear" data-aos-duration="1500">Register? </a>
        </div>
      </div>
    </div>
  </div>
</section>
