<div class="navbar-wrapper text-focus-in d-none d-lg-block" [ngClass]="{'scrolled-down': isScrolledDown, 'scrolled-up': !isScrolledDown}">
  <nav class="navbar navbar-expand-lg navbar-dark nav1">
    <div class="container py-2">
      <a class="navbar-brand" href="#"><img src="assets/ONE 8 (1).png" alt="" class="img1"></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse flex1" id="navbarNavDropdown">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link px-3 btn1 mx-2" routerLink="/home" data-bs-dismiss="offcanvas"  routerLinkActive="active-link">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link px-3 btn1 mx-2" routerLink="/about" data-bs-dismiss="offcanvas"  routerLinkActive="active-link">About Us</a>
          </li>
          <li class="nav-item">
            <a class="nav-link px-3 btn1 mx-2" routerLink="/contact-us" data-bs-dismiss="offcanvas"  routerLinkActive="active-link">Contact</a>
          </li>
          <li class="nav-item">
            <a class="nav-link px-3 btn1 mx-2" (click)="book()">Book Now</a>
          </li>
          <li class="nav-item">
            <a class="nav-link px-3 btn1 mx-2" routerLink="/booking" routerLinkActive="active-link">My Bookings</a>
          </li>
          <!-- <li class="nav-item" *ngIf="logginStatus">
            <a class="nav-link px-3 btn1 mx-2" routerLink="/profile" routerLinkActive="active-link">
              <i class="fa fa-user profile-icon-img"></i></a>
          </li> -->
        </ul>
        
      </div>
      <div class="nav-item" (click)="toggleNotifications()" *ngIf="logginStatus">
        <a class="nav-link px-3 btn1 mx-2" routerLinkActive="active-link">
          <i class="fa fa-bell profile-icon-img"></i>
          <span class="notification-count" *ngIf="notificationCount > 0">{{ notificationCount }}</span></a>
      </div>
    </div>
  </nav>
</div>


<div class="navbar-wrapper d-lg-none">
<nav class="navbar navbar-dark bg-dark fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="#"><img src="assets/ONE 8 (1).png" alt="" class="img2"></a>
    <p class="navbar-toggler margib" data-bs-toggle="offcanvas" data-bs-target="#offcanvasDarkNavbar" aria-controls="offcanvasDarkNavbar" aria-label="Toggle navigation">
      <img src="/assets/menu.png" alt="" class="text-white">
    </p>
    <div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1" id="offcanvasDarkNavbar" aria-labelledby="offcanvasDarkNavbarLabel">
      <div class="offcanvas-header">
        <a class="navbar-brand" href="#"><img src="assets/ONE 8 (1).png" alt="" class="img2"></a>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body">
        <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
          <li class="nav-item border-top py-2">
            <a class="nav-link px-3" aria-current="page" href="" routerLink="/home" data-bs-dismiss="offcanvas" routerLinkActive="active-link">Home</a>
          </li>
          <li class="nav-item border-top py-2">
            <a class="nav-link px-3" aria-current="page" href="" routerLink="/about" data-bs-dismiss="offcanvas" routerLinkActive="active-link">About Us</a>
          </li>
          <li class="nav-item border-top py-2">
            <a class="nav-link px-3" aria-current="page" href="" routerLink="/contact-us" data-bs-dismiss="offcanvas" routerLinkActive="active-link">Contact</a>
          </li>
          <li class="nav-item border-top py-2">
            <a class="nav-link px-3" aria-current="page" href="" data-bs-dismiss="offcanvas"  (click)="book()">Book Now</a>
          </li>
          <li class="nav-item border-top py-2">
            <a class="nav-link px-3" aria-current="page" href="" routerLink="/booking" data-bs-dismiss="offcanvas" routerLinkActive="active-link">My Bookings</a>
          </li>
          <li class="nav-item border-top py-2" *ngIf="logginStatus">
            <a class="nav-link px-3" aria-current="page" href="" data-bs-dismiss="offcanvas" (click)="logout()">Logout</a>
          </li>
          <li class="nav-item border-top py-2" (click)="toggleNotifications()" *ngIf="logginStatus">
            <a class="nav-link px-3" aria-current="page" href="" routerLink="/contact" data-bs-dismiss="offcanvas" routerLinkActive="active-link">
              <img src="assets/images/icons8-notification-26.png"  >
             <span class="notification-count" *ngIf="notificationCount > 0">{{ notificationCount }}</span></a>
          </li>
          <!-- <li class="nav-item border-top py-2" *ngIf="logginStatus">
            <a class="nav-link px-3" aria-current="page" href="" data-bs-dismiss="offcanvas" routerLink="/profile" routerLinkActive="active-link">
              <i class="fa fa-user sidebar-profile-icon"></i></a>
          </li> -->
          <li class="border-top"></li>
        </ul>
      </div>
    </div>
  </div>
</nav>
</div>



<div class="notification-box" *ngIf="isNotificationOpen">
  <ul class="notification-list">
    <li class="notification-item" *ngFor="let notification of notifications">
      <div (click)="markAsViewedAndRoute(notification.notification_id)">{{ notification.message }}
      </div>
    </li>
    <h1 *ngIf="notificationCount == 0">No Notifications</h1>
  </ul>
</div>
